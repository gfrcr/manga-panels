# manga-panels — exemplo de configuração.
#
# Copie pra `manga-panels.toml` (na pasta de onde você roda o comando) ou pra
# `~/.config/manga-panels/config.toml`, e ajuste. As chaves são os nomes das
# flags (`--max-width` -> `max_width`); qualquer flag na linha de comando sempre
# vence o config. Descomente só o que você quer mudar — tudo tem default.

[defaults]

# Pasta pra escanear quando você roda `manga-panels` SEM input: abre um menu
# numerado pra navegar as subpastas e escolher os arquivos.
# library = "/caminho/para/seus/mangas"

# Saída: "jpeg"/"png" dentro de um cbz, ou "pdf" (um painel por página; pro Kindle
# e leitores que só abrem PDF). O pdf precisa do extra: uv sync --extra pdf
format = "jpeg"
quality = 90            # qualidade jpeg, 1..95 (só vale pra jpeg)

# Reduz imagens mais largas que N px (mantém proporção, nunca amplia). Use a
# largura da tela do seu aparelho. Sem isso, mantém a resolução original.
#   1072 = Kindle básico / Kobo Clara / Boox Poke (6")
#   1236 = Kindle Paperwhite 11ª (6.8")
#   1264 = Paperwhite 12ª / Oasis / Kobo Libra / Boox Page (7")  <- cobre a maioria
#   1404 = Boox Note Air / reMarkable 2 / Kobo Elipsa (10.3")
#   1860 = Kindle Scribe (10.2")
# max_width = 1264

# Alternativa ao max_width: preset por leitor (basic/pw11/paperwhite/sage/tablet/
# scribe/phone). Se max_width também estiver setado, ele vence.
# device = "paperwhite"

# e-ink: tons de cinza (menor, nativo do e-paper) e gamma pra escurecer os
# meios-tons (>1 = mais contraste; 1.0 = off). Só afetam a saída processada.
# grayscale = true
# gamma = 1.8

# Página-macro (a página inteira, pra ver o contexto antes dos painéis):
#   "before" (default), "after" ou "off".
page = "before"

# Mantém as primeiras N páginas inteiras (capa/folha de rosto), sem cortar.
keep_first = 0

# Texto adicionado ao nome de saída (default "_panels" -> capitulo_panels.cbz).
suffix = "_panels"

# Sobrescreve o arquivo original no lugar (DESTRUTIVO; grava num temp e troca).
overwrite = false

# Sempre gerar preview (painéis desenhados) ou debug (tudo que o Magi vê) em vez
# de processar. Normalmente é melhor usar as flags --preview/--debug pontualmente.
# preview = false
# debug = false

# Saída padrão (arquivo ou pasta). Geralmente melhor passar -o na linha de comando.
# output = "./saida"
